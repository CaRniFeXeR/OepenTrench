<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D8CFF"/>
      <stop offset="1" stop-color="#0A4FB3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="url(#bg)"/>

  <!-- Ground -->
  <rect x="64" y="120" width="384" height="48" fill="#7BC96F"/>
  <rect x="64" y="168" width="384" height="220" rx="24" fill="#7A4E2B"/>

  <!-- Trench -->
  <path d="M180 168 L140 388 H372 L332 168 Z" fill="#5A3820"/>

  <!-- Fiber Cable -->
  <path d="M120 320 C180 280, 260 280, 392 320" stroke="#1F2937" stroke-width="44" stroke-linecap="round"/>

  <!-- Fiber Core Colors -->
  <circle cx="310" cy="300" r="10" fill="#FF5A5A"/>
  <circle cx="336" cy="300" r="10" fill="#FFD93D"/>
  <circle cx="362" cy="300" r="10" fill="#4DD4FF"/>

  <!-- Magnifying Glass -->
  <circle cx="210" cy="300" r="60" fill="none" stroke="#E5E7EB" stroke-width="16"/>
  <line x1="250" y1="340" x2="290" y2="380" stroke="#E5E7EB" stroke-width="18" stroke-linecap="round"/>

  <!-- Analysis Grid -->
  <line x1="180" y1="260" x2="180" y2="340" stroke="#4DD4FF" stroke-width="2" opacity="0.6"/>
  <line x1="210" y1="260" x2="210" y2="340" stroke="#4DD4FF" stroke-width="2" opacity="0.6"/>
  <line x1="240" y1="260" x2="240" y2="340" stroke="#4DD4FF" stroke-width="2" opacity="0.6"/>
  <line x1="170" y1="280" x2="250" y2="280" stroke="#4DD4FF" stroke-width="2" opacity="0.6"/>
  <line x1="170" y1="310" x2="250" y2="310" stroke="#4DD4FF" stroke-width="2" opacity="0.6"/>

  <!-- Simple warning marker -->
  <path d="M256 80 L300 144 H212 Z" fill="#FFD93D" stroke="#1F2937" stroke-width="10"/>
  <circle cx="256" cy="124" r="8" fill="#1F2937"/>
</svg>
